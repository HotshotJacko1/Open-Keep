workflows:
  ios-app-build:
    name: iOS App Build
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: '*'
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Build web application
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Build iOS app (Unsigned)
        script: |
          # Build an unsigned app for the iOS Simulator to verify the build passes.
          # To build a distributable .ipa, you must configure Apple Developer Code Signing in Codemagic.
          xcodebuild build \
            -project "ios/App/App.xcodeproj" \
            -scheme "App" \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - /tmp/xcodebuild_logs/*.log
      - xcodebuild/**/*.log
